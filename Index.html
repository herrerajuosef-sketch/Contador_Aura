<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contador con Aura</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="counter">0</div>

  <div class="main-container">
    <div class="button-wrapper">
      <button id="powerButton">⚡</button>
    </div>

    <div class="increments">
      <button class="inc-btn selected" data-inc="1">+1</button>
      <button class="inc-btn" data-inc="2">+2</button>
      <button class="inc-btn" data-inc="5">+5</button>
      <button class="inc-btn" data-inc="10">+10</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
